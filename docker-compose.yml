services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: carebridge_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - .:/app   # hot reload (remove in production)

  db:
    image: postgres:15
    container_name: carebridge_db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: call_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata: